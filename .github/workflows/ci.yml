name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
      - run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
      - uses: golangci/golangci-lint-action@v9

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --snapshot --clean --skip=ko

  conform:
    name: Conformance
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install markdownlint-cli2 and JSON formatter
        run: npm install -g markdownlint-cli2 markdownlint-cli2-formatter-json
      - name: Run conformance test
        run: ./bench/conform.sh
